<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Agentic Operator</title>
<meta name="viewport" content="width=1440" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #0a0a0b;
    --bg-2: #0f0f11;
    --panel: #131317;
    --panel-2: #18181d;
    --panel-3: #1d1d23;
    --border: #232329;
    --border-2: #2c2c34;
    --border-3: #393942;
    --text: #ebebef;
    --text-2: #a8aab1;
    --text-3: #6f7178;
    --text-4: #46474d;
    --signal: #d0ff00;            /* electric lime — live/active */
    --signal-dim: #5a6e00;
    --blue: #84a9ff;
    --green: #65e0a3;
    --amber: #ffb547;
    --red: #ff6470;
    --violet: #b594ff;

    --sans: "IBM Plex Sans", system-ui, -apple-system, sans-serif;
    --mono: "IBM Plex Mono", ui-monospace, Menlo, monospace;
    --display: "Instrument Serif", "IBM Plex Serif", Georgia, serif;

    --r-sm: 4px;
    --r-md: 6px;
    --r-lg: 10px;

    --density: 1; /* tweakable */
  }

  /* Light theme override (tweakable) */
  html[data-theme="light"] {
    --bg: #f6f6f4;
    --bg-2: #efefec;
    --panel: #ffffff;
    --panel-2: #f8f8f6;
    --panel-3: #f1f1ee;
    --border: #e3e3df;
    --border-2: #d4d4cf;
    --border-3: #b8b8b2;
    --text: #1a1a1d;
    --text-2: #5a5b62;
    --text-3: #8c8d94;
    --text-4: #b8b9be;
    --signal: #4d5e00;
    --signal-dim: #c8d985;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  html[data-density="comfortable"] { --density: 1.18; }
  html[data-density="compact"] { --density: 0.88; }

  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 10px; border: 2px solid var(--bg); }
  ::-webkit-scrollbar-thumb:hover { background: var(--border-3); }

  /* Selection */
  ::selection { background: var(--signal); color: #000; }

  /* Utility classes used across views */
  .mono { font-family: var(--mono); font-feature-settings: "ss01" on; }
  .display { font-family: var(--display); font-weight: 400; letter-spacing: -0.01em; }
  .muted { color: var(--text-2); }
  .dim { color: var(--text-3); }
  .nowrap { white-space: nowrap; }

  /* Live signal — for the pulse indicator */
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.45; transform: scale(0.85); }
  }
  @keyframes tick {
    0% { transform: translateX(-4px); opacity: 0; }
    10% { opacity: 1; }
    100% { transform: translateX(0); opacity: 1; }
  }
  @keyframes edge-flow {
    from { stroke-dashoffset: 24; }
    to { stroke-dashoffset: 0; }
  }
  @keyframes dot-flow {
    from { offset-distance: 0%; opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    to { offset-distance: 100%; opacity: 0; }
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  @keyframes shimmer {
    0% { background-position: -200px 0; }
    100% { background-position: 200px 0; }
  }
  @keyframes fadein {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .live-dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--signal);
    box-shadow: 0 0 6px var(--signal);
    animation: pulse 1.4s infinite;
  }
  .live-dot.green { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .live-dot.amber { background: var(--amber); box-shadow: 0 0 6px var(--amber); }
  .live-dot.red { background: var(--red); box-shadow: 0 0 6px var(--red); }

  /* Reset for buttons */
  button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; padding: 0; }

  /* Root app frame is sized to viewport */
  #root { height: 100vh; overflow: hidden; }

  /* For Tweaks panel scrollbar inside */
  .tweaks-panel { font-family: var(--sans) !important; }
</style>

<script type="application/json" id="speaker-notes">[]</script>
</head>
