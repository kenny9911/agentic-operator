packages:
  - "apps/*"
  - "packages/*"
  - "tenants/*"

# pnpm 11 gates lifecycle scripts (postinstall, etc.) for security. Pre-approve
# the natives we've vetted so a fresh `pnpm install` rebuilds them automatically
# instead of stopping with an `[ERR_PNPM_IGNORED_BUILDS]` warning.
#
# `allowBuilds` (package -> true|false) is pnpm 11's key for this. The old
# `pnpm.onlyBuiltDependencies` field in package.json is no longer read (pnpm
# warns and ignores it), so that redundant copy was removed — this file is now
# the single source of truth for build approval.
allowBuilds:
  better-sqlite3: true
  esbuild: true
  protobufjs: true
  sharp: true
  unrs-resolver: true
