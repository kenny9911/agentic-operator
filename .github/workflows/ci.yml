# P4-CI-01 — CI pipeline for Agentic Operator.
#
# Triggers on every push and pull request targeting `main`. Each job
# below runs in its own runner so a failure in (say) coverage doesn't
# block the build/docker matrix from giving signal. The single required
# check for branch protection is `ci` (the meta job at the bottom that
# depends on all leafs); see docs/CI.md.

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-flight runs of the same workflow on the same ref to save
# minutes. Especially useful on a force-push to a PR branch.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Pinned to .nvmrc — the native sqlite binding is compiled per Node
  # major. Any bump here also requires regenerating better-sqlite3.
  NODE_VERSION: "26"
  PNPM_VERSION: "11.1.2"
  # Tests assume the mock provider so no real API keys are needed.
  LLM_DEFAULT_PROVIDER: mock
  LLM_DEFAULT_MODEL: mock-model-v1
  # Set NODE_ENV=test to opt into the test-time logging level. (apps/api
  # picks this up in src/server.ts.)
  NODE_ENV: test

jobs:
  install:
    name: Install + cache
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      pnpm-store: ${{ steps.pnpm-cache.outputs.dir }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - id: pnpm-cache
        shell: bash
        run: echo "dir=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    needs: install
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: install
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r lint

  test-coverage:
    name: Unit + coverage gate
    runs-on: ubuntu-latest
    needs: install
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # apps/api expects data/agentic.db to exist with the latest
      # migrations applied. The seed step makes the test setup
      # deterministic across runs (sqlite is single-file; CI runners are
      # ephemeral).
      - name: Apply migrations + seed
        run: |
          pnpm db:migrate
          pnpm db:seed

      # The test:coverage script invokes vitest run --coverage in each
      # workspace; coverage thresholds (lines >=70 / branches >=60) are
      # encoded in each vitest.config.ts. A miss fails the workspace
      # and turbo propagates the non-zero exit code.
      - name: Run tests with coverage gate
        run: pnpm -r test:coverage

      - name: Upload coverage artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            apps/api/coverage
            apps/web/coverage
            apps/cli/coverage
          if-no-files-found: ignore
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: install
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [install, build]
    timeout-minutes: 25
    env:
      # The Playwright e2e config boots `pnpm dev` itself when
      # PW_AUTO_WEBSERVER=1. We pin it on for CI so a missing webServer
      # block doesn't silently make the suite skip.
      PW_AUTO_WEBSERVER: "1"
      AUTH_MODE: dev
      AGENTIC_DEV_TENANT: raas
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Apply migrations + seed
        run: |
          pnpm db:migrate
          pnpm db:seed
          pnpm seed:rich

      - name: Install Playwright browsers
        run: pnpm --filter @agentic/web exec playwright install --with-deps chromium

      - name: Run E2E suite
        run: pnpm --filter @agentic/web test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          if-no-files-found: ignore
          retention-days: 7

  docker:
    name: Docker buildx (smoke)
    runs-on: ubuntu-latest
    needs: install
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      # TODO(P4-OPS-01): the Dockerfiles land under Engineer A's
      # workstream. Until then, this job verifies BuildKit is wired and
      # short-circuits if no Dockerfile is present. Flip the `if:` block
      # below to a real build once apps/api/Dockerfile + apps/web/Dockerfile
      # are checked in.
      - name: Detect Dockerfiles
        id: detect
        run: |
          api=$(test -f apps/api/Dockerfile && echo "yes" || echo "no")
          web=$(test -f apps/web/Dockerfile && echo "yes" || echo "no")
          echo "api=$api" >> "$GITHUB_OUTPUT"
          echo "web=$web" >> "$GITHUB_OUTPUT"

      - name: Build apps/api image
        if: steps.detect.outputs.api == 'yes'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: false
          tags: agentic-api:ci

      - name: Build apps/web image
        if: steps.detect.outputs.web == 'yes'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: false
          tags: agentic-web:ci

      - name: Note when both Dockerfiles are absent
        if: steps.detect.outputs.api == 'no' && steps.detect.outputs.web == 'no'
        run: |
          echo "::warning::No Dockerfiles found yet (P4-OPS-01 / P4-OPS-02 pending). Skipping docker build."

  # Meta gate — branch protection should require *this* job, which is
  # green only when every leaf above is green. Adding new jobs above
  # automatically tightens the protection once they're listed here.
  ci:
    name: CI
    if: always()
    needs: [typecheck, lint, test-coverage, build, e2e, docker]
    runs-on: ubuntu-latest
    steps:
      - name: Fail when any required leaf failed
        if: |
          needs.typecheck.result != 'success' ||
          needs.lint.result != 'success' ||
          needs.test-coverage.result != 'success' ||
          needs.build.result != 'success' ||
          needs.e2e.result != 'success' ||
          needs.docker.result != 'success'
        run: |
          echo "One or more required leaf jobs failed."
          echo "typecheck=${{ needs.typecheck.result }}"
          echo "lint=${{ needs.lint.result }}"
          echo "test-coverage=${{ needs.test-coverage.result }}"
          echo "build=${{ needs.build.result }}"
          echo "e2e=${{ needs.e2e.result }}"
          echo "docker=${{ needs.docker.result }}"
          exit 1
      - name: Summary
        run: echo "All CI leaf jobs passed."
