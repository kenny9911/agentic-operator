# P4-CI-02 — Release pipeline.
#
# Triggers when a tag like `v1.0.0` is pushed. Builds + pushes the api
# and web Docker images to the configured registry. The registry name
# is left as `ghcr.io/PLACEHOLDER/agentic-operator` so the user can swap
# in their org (GHCR/ECR/GAR) before the first cut. Image tags follow
# the git tag (e.g. v1.0.0) plus `latest` for the default branch.
#
# Out of scope: Helm chart publishing, SBOM, signing — track as v1.1
# items once we have a deployment target.

name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.0.0). Defaults to git ref."
        required: false
        type: string

# Only one release builds at a time per tag; back-to-back tags queue.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "26"
  PNPM_VERSION: "11.1.2"
  # TODO(P4-OPS-02): replace `ghcr.io/PLACEHOLDER` with the real registry
  # (e.g. `ghcr.io/anthropic` or your org's GHCR namespace) before first
  # release cut. Once swapped, the GITHUB_TOKEN-issued credential below
  # has write-package scope for GHCR by default.
  REGISTRY: ghcr.io/PLACEHOLDER
  IMAGE_PREFIX: agentic

jobs:
  build-push:
    name: Build + push images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            # github.ref_name is the tag for tag-push events.
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Optional sanity gate: re-run the full test suite + coverage on
      # the tagged commit. Catches the "release the wrong sha" foot-gun.
      - name: Verify tests + coverage on release commit
        run: |
          pnpm db:migrate
          pnpm db:seed
          pnpm -r test:coverage

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          # PLACEHOLDER registries don't authenticate; once the user swaps
          # in a real ghcr.io/<org> path, this picks up the workflow's
          # GITHUB_TOKEN. For non-GHCR registries (ECR, GAR, Docker Hub)
          # swap in the corresponding `*-login-action` step.
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect Dockerfiles
        id: detect
        run: |
          api=$(test -f apps/api/Dockerfile && echo "yes" || echo "no")
          web=$(test -f apps/web/Dockerfile && echo "yes" || echo "no")
          worker=$(test -f apps/inngest-worker/Dockerfile && echo "yes" || echo "no")
          echo "api=$api"      >> "$GITHUB_OUTPUT"
          echo "web=$web"      >> "$GITHUB_OUTPUT"
          echo "worker=$worker">> "$GITHUB_OUTPUT"

      - name: Build + push apps/api image
        if: steps.detect.outputs.api == 'yes'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-api:${{ steps.tag.outputs.value }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-api:latest

      - name: Build + push apps/web image
        if: steps.detect.outputs.web == 'yes'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-web:${{ steps.tag.outputs.value }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-web:latest

      - name: Build + push apps/inngest-worker image
        if: steps.detect.outputs.worker == 'yes'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/inngest-worker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-inngest-worker:${{ steps.tag.outputs.value }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-inngest-worker:latest

      - name: No Dockerfile warning
        if: |
          steps.detect.outputs.api == 'no' &&
          steps.detect.outputs.web == 'no' &&
          steps.detect.outputs.worker == 'no'
        run: |
          echo "::error::No Dockerfiles found. P4-OPS-01/02/03 must land before tagging a release."
          exit 1

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: build-push
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # `generate_release_notes` pulls commit subjects since the
          # previous tag; the user can edit the draft before publishing.
          generate_release_notes: true
          draft: true
          name: ${{ github.ref_name }}
